# /etc/nginx/sites-available/pulse
# Nginx reverse proxy for PULSE (Next.js on port 3000)
# After creating this file:
#   sudo ln -s /etc/nginx/sites-available/pulse /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl restart nginx
#   sudo certbot --nginx -d pulse.jera.co.za

server {
    listen 80;
    server_name pulse.jera.co.za;

    # Redirect HTTP to HTTPS (certbot will add this automatically)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Next.js static assets
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Max upload size (for contract PDFs and receipts)
    client_max_body_size 25M;
}
